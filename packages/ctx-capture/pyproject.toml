[project]
name = "ctx-capture"
version = "0.1.0"
description = "Pipeline instrumentation SDK for ctx observability system"
requires-python = ">=3.11"
dependencies = []

[project.scripts]
ctx-capture = "ctx_capture.scaffold.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ctx_capture", "src/ctxrun"]
