[project]
name = "ctx"
version = "0.1.0"
description = "Analyst CLI for ctx observability system"
requires-python = ">=3.11"
dependencies = [
    "ctx-capture",
    "rich>=13.0",
    "click>=8.0",
]

[project.optional-dependencies]
semantic = [
    "sentence-transformers>=3.0",
    "sqlite-vec>=0.1",
]

[project.scripts]
ctx = "ctx.cli:main"

[tool.uv.sources]
ctx-capture = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ctx"]
